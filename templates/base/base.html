{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Sistema de Asistencia
    </title>


    <style>

        body {

            font-family: "Segoe UI", Arial, sans-serif;

            background: #f5f7fb;

            margin: 0;

            padding: 20px;

        }


        /* esquina superior derecha */

        .top-menu {

            position: absolute;

            top: 10px;

            right: 15px;

            display: flex;

            align-items: center;

            gap: 12px;

        }



        .usuario {

            font-weight: bold;

            color: #34495e;

        }



        .btn-salir {


            background: #e74c3c;

            color: white;

            padding: 8px 15px;

            border-radius: 6px;

            text-decoration: none;

            font-size: 14px;


        }



        .btn-salir:hover {


            background: #c0392b;


        }



        .container {


            margin-top: 50px;


        }



    </style>


</head>



<body>



{% if user.is_authenticated %}


<div class="top-menu">


    <span class="usuario">

        👤 {{ user.username }}

    </span>



    <a class="btn-salir" href="{% url 'logout' %}">

        🚪 Salir

    </a>



</div>


{% endif %}





<div class="container">


    {% block content %}



    {% endblock %}


</div>




</body>


</html>
