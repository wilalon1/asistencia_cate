{% block title %}

{% endblock %}


{% block navbar %}
{% endblock %}


{% block content %}


<style>

*{
    box-sizing:border-box;
}


.login-page{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(circle at top left,#00c6ff,transparent 40%),
    radial-gradient(circle at bottom right,#0072ff,transparent 40%),
    #0f172a;

    overflow:hidden;

}



.login-card{


    width:380px;

    padding:35px;


    border-radius:25px;


    background:rgba(255,255,255,0.12);


    backdrop-filter:blur(15px);


    border:1px solid rgba(255,255,255,0.2);


    box-shadow:
    0 20px 50px rgba(0,0,0,.4);


    color:white;


}



.logo{


    width:80px;

    height:80px;


    margin:auto;


    border-radius:50%;


    display:flex;

    align-items:center;

    justify-content:center;


    font-size:40px;


    background:linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );


    box-shadow:
    0 10px 25px rgba(0,198,255,.5);


}



.login-title{


    text-align:center;


    margin-top:20px;


    font-size:26px;


}



.form-control{


    width:100%;


    padding:13px 15px;


    margin-top:8px;


    border-radius:12px;


    border:none;


    outline:none;


    color:white;


    background:
    rgba(255,255,255,.15);


}



.form-control::placeholder{

    color:#ddd;

}



.form-group{

    margin-bottom:20px;

}



.btn-login{


    width:100%;


    padding:13px;


    border:none;


    border-radius:12px;


    color:white;


    font-weight:bold;


    font-size:16px;


    cursor:pointer;


    background:
    linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );


    transition:.3s;


}



.btn-login:hover{


    transform:translateY(-3px);


    box-shadow:
    0 10px 25px rgba(0,198,255,.5);


}



.forgot{


    text-align:right;


}



.forgot a{


    color:#ddd;


    font-size:13px;


    text-decoration:none;


}



.forgot a:hover{

    color:white;

}



</style>




<div class="login-page">


<div class="login-card">



<div class="logo">

🔐

</div>



<h2 class="login-title">

Sistema Asistencia

</h2>



<p style="text-align:center;color:#ddd">

Ingresa a tu cuenta

</p>




<form method="post">


{% csrf_token %}



<div class="form-group">


<label>

👤 Usuario

</label>


<input

class="form-control"

type="text"

name="username"

placeholder="Ingrese usuario"


>


</div>





<div class="form-group">


<label>

🔑 Contraseña

</label>


<input

class="form-control"

type="password"

name="password"

placeholder="Ingrese contraseña"


>


</div>





<div class="forgot">


<a href="{% url 'password_reset' %}">

¿Olvidaste tu contraseña?

</a>


</div>





<br>



<button class="btn-login" type="submit">


Ingresar


</button>



</form>



</div>


</div>



{% endblock %}
